apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-nginx-deployment
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express-nginx
  template:
    metadata:
      labels:
        app: express-nginx
    spec:
      containers:

      # Express App
      - name: express-app
        image: polush/express-app:latest
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

      # Nginx
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config