name: Deploy to GCP Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/express-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}   # should be ubuntu
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 15m

          script: |
            set -e  # fail fast

            echo "📦 Starting deployment..."

            cd /home/${{ secrets.GCP_VM_USER }}

            # Clone repo if not exists
            if [ ! -d "Module-3-deployment" ]; then
              git clone https://github.com/Ariful-Huq/Module-3-deployment.git
            fi

            cd Module-3-deployment
            git pull origin main

            # Ensure kubeconfig works in non-interactive shell
            export KUBECONFIG=/etc/kubernetes/admin.conf

            # Ensure namespace exists
            kubectl get namespace production >/dev/null 2>&1 || kubectl create namespace production

            # Apply configs
            kubectl apply -f nginx-config.yaml
            kubectl apply -f deployment.yaml
            kubectl apply -f service.yaml

            # Allow scheduling on single node
            kubectl taint nodes --all node-role.kubernetes.io/control-plane- >/dev/null 2>&1 || true

            # Restart deployment to pull latest image
            kubectl rollout restart deployment express-nginx-deployment -n production

            # Wait for rollout (better than just wait)
            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment express-nginx-deployment -n production --timeout=180s

            # Extra safety: ensure pods are ready
            kubectl wait --namespace production \
              --for=condition=Ready pods \
              --selector=app=express-nginx \
              --timeout=180s

            # Debug output (very useful in CI)
            echo "📊 Final pod status:"
            kubectl get pods -n production -o wide

            echo "🌐 Service info:"
            kubectl get svc -n production

            echo "✅ Deployment completed successfully!"