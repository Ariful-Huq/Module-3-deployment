name: Build & Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      # 3️⃣ Build & push Docker image
      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/express-nginx:latest
          echo "📦 Building Docker image $IMAGE_NAME..."
          docker build -t $IMAGE_NAME .
          echo "🚀 Pushing Docker image..."
          docker push $IMAGE_NAME

      # 4️⃣ Deploy to VM via SSH
      - name: SSH & deploy to GCP VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ubuntu
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            echo "📦 Starting deployment on VM..."

            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "Module-3-deployment" ]; then
              git clone https://github.com/Ariful-Huq/Module-3-deployment.git
            fi

            cd Module-3-deployment
            git pull origin main

            # Set kubeconfig
            export KUBECONFIG=$HOME/.kube/config

            # Ensure namespace exists
            kubectl get namespace production >/dev/null 2>&1 || kubectl create namespace production

            # Update deployment image
            IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/express-nginx:latest
            kubectl set image deployment/express-nginx-deployment express-nginx=$IMAGE_NAME -n production

            # Apply configs (for any other changes)
            kubectl apply -f nginx-config.yaml
            kubectl apply -f deployment.yaml
            kubectl apply -f service.yaml

            # Allow scheduling on single node
            kubectl taint nodes --all node-role.kubernetes.io/control-plane- >/dev/null 2>&1 || true

            # Restart deployment
            kubectl rollout restart deployment express-nginx-deployment -n production

            # Wait for rollout
            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment express-nginx-deployment -n production --timeout=180s

            # Ensure pods are ready
            kubectl wait --namespace production \
              --for=condition=Ready pods \
              --selector=app=express-nginx \
              --timeout=180s

            # Debug output
            echo "📊 Final pod status:"
            kubectl get pods -n production -o wide
            echo "🌐 Service info:"
            kubectl get svc -n production
            echo "✅ Deployment completed successfully!"